<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon imported from src/assets/images and applied at runtime -->
    <link rel="icon" type="image/png" href="/favicon.png" /> <!-- fallback until script runs -->
    <script type="module">
      import kenyaFavicon from '/src/assets/images/kenya-favicon.png';
      const link = document.querySelector('link[rel="icon"]');
      if (link) link.href = kenyaFavicon;
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Affordable Housing Programme – Nakuru Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  </head>
  <body>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
